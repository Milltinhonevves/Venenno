<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Venenno</title>
  <meta name="theme-color" content="#00ff88">
  <link rel="stylesheet" href="/static/css/style.css?v=12">
</head>
<body>

<header>
  <h1>🐍 Venenno</h1>
  <p>por Miltinho Neves</p>
</header>

<div class="container">

  <!-- GRAVADOR -->
  <div class="card">
    <h2>🎙️ Gravador</h2>
    <div class="gravador">
      <button type="button" class="btn-mic" id="btn-mic">🎙️</button>
      <div class="timer" id="timer">00:00</div>
      <div class="status-rec" id="status-rec">Toque no microfone para gravar</div>
      <div class="preview-box" id="preview-box" hidden>
        <audio id="preview-audio" controls></audio>
        <div class="btns-rec">
          <button type="button" class="btn btn-secundario" id="btn-regravar" hidden>🔄 Regravar</button>
          <button type="button" class="btn btn-perigo"     id="btn-apagar"   hidden>🗑️ Apagar</button>
          <button type="button" class="btn btn-secundario" id="btn-reusar"   hidden>♻️ Reusar</button>
        </div>
      </div>
      <div style="width:100%;text-align:center;color:#555;font-size:.8rem;margin-top:8px">— ou —</div>
      <label class="btn btn-secundario" style="width:100%;text-align:center;margin-top:4px">
        📂 Selecionar arquivo
        <input type="file" id="audio-input" accept="audio/*" style="display:none">
      </label>
    </div>
  </div>

  <!-- AFINAÇÃO -->
  <div class="card">
    <h2>🎵 Afinação</h2>
    <div class="row2">
      <div>
        <label class="lbl">Tônica</label>
        <select name="tonica">
          <option value="C">C</option><option value="C#">C#</option>
          <option value="D">D</option><option value="D#">D#</option>
          <option value="E">E</option><option value="F">F</option>
          <option value="F#">F#</option><option value="G" selected>G</option>
          <option value="G#">G#</option><option value="A">A</option>
          <option value="A#">A#</option><option value="B">B</option>
        </select>
      </div>
      <div>
        <label class="lbl">Escala</label>
        <select name="escala">
          <option value="cromatica">Cromática</option>
          <option value="maior" selected>Maior</option>
          <option value="menor">Menor</option>
          <option value="pentatonica_maior">Pent. Maior</option>
          <option value="pentatonica_menor">Pent. Menor</option>
        </select>
      </div>
    </div>
    <div class="slider-group">
      <div class="slider-header"><span>INTENSIDADE</span><span id="val-strength">80%</span></div>
      <input type="range" name="strength" min="0" max="100" value="80"
             oninput="document.getElementById('val-strength').textContent=this.value+'%'">
    </div>
  </div>

  <!-- EQ -->
  <div class="card">
    <h2>🎛️ Equalizador</h2>
    <div class="slider-group">
      <div class="slider-header"><span>GRAVES (100Hz)</span><span id="eq-graves-val">0dB</span></div>
      <input type="range" name="eq_graves" min="-12" max="12" step="1" value="0"
        oninput="document.getElementById('eq-graves-val').textContent=this.value+'dB'">
    </div>
    <div class="slider-group">
      <div class="slider-header"><span>MÉDIOS (1kHz)</span><span id="eq-medios-val">0dB</span></div>
      <input type="range" name="eq_medios" min="-12" max="12" step="1" value="0"
        oninput="document.getElementById('eq-medios-val').textContent=this.value+'dB'">
    </div>
    <div class="slider-group">
      <div class="slider-header"><span>AGUDOS (8kHz)</span><span id="eq-agudos-val">0dB</span></div>
      <input type="range" name="eq_agudos" min="-12" max="12" step="1" value="0"
        oninput="document.getElementById('eq-agudos-val').textContent=this.value+'dB'">
    </div>
  </div>

  <!-- EFEITOS -->
  <div class="card">
    <h2>🎚️ Efeitos</h2>
    <div class="slider-group">
      <div class="slider-header"><span>REDUÇÃO DE RUÍDO</span><span id="ruido-val">0%</span></div>
      <input type="range" name="reducao_ruido" min="0" max="1" step="0.05" value="0"
        oninput="document.getElementById('ruido-val').textContent=Math.round(this.value*100)+'%'">
    </div>
  </div>

  <!-- CONTROLE DE SEMITONS -->
  <div class="semitom-control">
    <span class="semitom-label">🎵 Semitons</span>
    <div class="semitom-row">
      <button type="button" class="btn-semi" id="btnMenos">−</button>
      <span class="semitom-valor" id="semitonValor">0</span>
      <button type="button" class="btn-semi" id="btnMais">+</button>
    </div>
    <button type="button" class="btn-preview" id="btnPreview" disabled>▶ Pré-escuta</button>
  </div>

  <!-- BOTÃO -->
  <button type="button" class="btn btn-primario" id="btn-processar" disabled>
    <span id="btn-texto">🐍 Aplicar Venenno</span>
    <span id="btn-loading" hidden><span class="spinner"></span> Processando...</span>
  </button>

  <!-- SALVAR NA BIBLIOTECA -->
  <button type="button" class="btn-salvar" id="btn-salvar" hidden>
    💾 Salvar na Biblioteca
  </button>

  <!-- RESULTADO -->
  <div class="resultado-card" id="resultado" hidden>
    <strong style="color:#00ff88">✅ Pronto!</strong>
    <audio id="player" controls></audio>
    <a class="btn-download" id="btn-download" href="#" download>⬇️ Baixar áudio processado</a>
  </div>

  <!-- ERRO -->
  <div class="erro-card" id="erro" hidden></div>

</div>

<footer>🐍 VENENNO — por Miltinho Neves</footer>

<script src="/static/js/main.js?v=1779741423"></script>
</body>
</html>
